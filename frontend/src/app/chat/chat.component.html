<div [class.floating-chat]="isFloating">
  <div *ngIf="currentUser; else authRequired" class="chat-content">
    <div *ngIf="!isFloating" class="card chat-container">
      <h2>💬 Asistente de Viajes IA</h2>
      <p class="description">Pregunta sobre destinos, presupuestos, actividades y más.</p>
    </div>

    <div [class]="isFloating ? 'messages-floating' : 'messages-container'">
      <div *ngIf="messages.length === 0 && !isFloating" class="empty-state">
        <p>Inicia una conversación con nuestro asistente de viajes impulsado por IA.</p>
      </div>

      <div *ngFor="let msg of messages" [class]="'message message-' + msg.role">
        <p>{{ msg.content }}</p>
        <small *ngIf="!isFloating">{{ msg.created_at | date:'short' }}</small>
      </div>

      <div *ngIf="loading" class="message message-assistant">
        <p class="typing-indicator">
          <span></span><span></span><span></span>
        </p>
      </div>
    </div>

    <div *ngIf="error" class="error-message">
      ⚠️ {{ error }}
    </div>

    <div class="input-container" [class.floating-input]="isFloating">
      <textarea
        [(ngModel)]="userMessage"
        (keypress)="handleKeyPress($event)"
        [placeholder]="isFloating ? 'Escribe aquí...' : 'Escribe tu pregunta aquí...'"
        [disabled]="loading"
        [rows]="isFloating ? 2 : 3"
      ></textarea>
      <button (click)="sendMessage()" [disabled]="loading || !userMessage.trim()" class="send-btn">
        <span *ngIf="!loading">📤</span>
        <span *ngIf="loading">⏳</span>
      </button>
    </div>
  </div>

  <ng-template #authRequired>
    <div class="auth-required">
      <p>Debes <a routerLink="/profile" (click)="closeChat()">iniciar sesión</a> para usar el chat con IA.</p>
    </div>
  </ng-template>
</div>
