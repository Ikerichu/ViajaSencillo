<section class="card">
  <h2>Crear viaje</h2>
  <form (ngSubmit)="submit()">
    <label>
      Ciudad destino
      <select [(ngModel)]="destination" name="destination">
        <option *ngFor="let item of destinations" [value]="item">{{ item }}</option>
      </select>
    </label>

    <label>
      Fecha inicio
      <input type="date" [(ngModel)]="start_date" name="start_date" required />
    </label>

    <label>
      Fecha fin
      <input type="date" [(ngModel)]="end_date" name="end_date" required />
    </label>

    <label>
      Presupuesto total (€)
      <input type="number" [(ngModel)]="budget" name="budget" min="100" required />
    </label>

    <div class="checkbox-group">
      <span>Intereses</span>
      <label><input type="checkbox" [(ngModel)]="interests.comida" name="comida" /> Comida</label>
      <label><input type="checkbox" [(ngModel)]="interests.cultura" name="cultura" /> Cultura</label>
      <label><input type="checkbox" [(ngModel)]="interests.naturaleza" name="naturaleza" /> Naturaleza</label>
      <label><input type="checkbox" [(ngModel)]="interests.fiesta" name="fiesta" /> Fiesta</label>
    </div>

    <button type="submit" [disabled]="loading">Generar itinerario</button>
    <p *ngIf="error" class="error">{{ error }}</p>
  </form>
</section>
